<div [style.max-width.px]="width" class="list_actions">
    <ng-container *ngFor="let action of actions">
        <button *ngIf="!action?.activated" (click)="triggerAction(action)" class="not_activated"
            matTooltip="{{action | actionDisplayer:'tooltip' |translate}}"
            class="resultitem-list__actions {{action.id}}-onhover-action {{action.cssClass}}-onhover-action">
            {{action | actionDisplayer:'label' | translate}}
        </button>
        <button *ngIf="action?.activated" (click)="triggerAction(action)"
            matTooltip="{{action | actionDisplayer:'tooltip' |translate}}"
            class="resultitem-list__actions {{action.id}}-onhover-action {{action.cssClass}}-onhover-action">
            {{action | actionDisplayer:'label' | translate}}
        </button>
    </ng-container>
</div>
