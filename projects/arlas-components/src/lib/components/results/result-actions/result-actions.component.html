<div [style.max-width.px]="width" class="list_actions">
    <ng-container *ngFor="let action of actions">
        <ng-container *ngIf="action?.activated">
            <button *ngIf="!action?.icon else active_icon"  (click)="triggerAction(action)"
                matTooltip="{{action | actionDisplayer:'tooltip' |translate}}"
                class="resultitem-list__actions {{action.id}}-onhover-action {{action.cssClass}}-onhover-action">
                {{action | actionDisplayer:'label' | translate}}
            </button>
            <ng-template #active_icon>
                <mat-icon (click)="triggerAction(action)" class="icon"
                    matTooltip="{{action | actionDisplayer:'tooltip' |translate}}">
                    {{action | actionDisplayer:'icon'}}
                </mat-icon>
            </ng-template>
        </ng-container>
    </ng-container>
    <ng-container *ngFor="let action of actions">
        <ng-container *ngIf="!action?.activated">
            <button *ngIf="!action?.icon else not_active_icon" (click)="triggerAction(action)" class="not_activated"
                matTooltip="{{action | actionDisplayer:'tooltip' |translate}}"
                class="resultitem-list__actions {{action.id}}-onhover-action {{action.cssClass}}-onhover-action">
                {{action | actionDisplayer:'label' | translate}}
            </button>
            <ng-template #not_active_icon>
                <mat-icon (click)="triggerAction(action)" class="icon not_activated"
                    matTooltip="{{action | actionDisplayer:'tooltip' |translate}}">
                    {{action | actionDisplayer:'icon'}}
                </mat-icon>
            </ng-template>
        </ng-container>
    </ng-container>
    
</div>
