<arlas-mapgl-mapbox #mapRef *ngIf="providerType === 'mapbox'" [id]="id" [dataSources]="dataSources"
                    [redrawSource]="redrawSource"
                    [legendUpdater]="legendUpdater" [visibilityUpdater]="visibilityUpdater"
                    [defaultBasemapStyle]="defaultBasemapStyle"
                    [visualisationSetsConfig]="visualisationSetsConfig"
                    [basemapStyles]="basemapStyles"
                    [margePanForLoad]="margePanForLoad"
                    [margePanForTest]="margePanForTest"
                    [initCenter]="initCenter"
                    [drawData]="drawData"
                    [initZoom]="initZoom"
                    [minZoom]="minZoom"
                    [maxZoom]="maxZoom"
                    [displayScale]="displayScale"
                    [displayCurrentCoordinates]="displayCurrentCoordinates"
                    [maxWidthScale]="maxWidthScale"
                    [unitScale]="unitScale"
                    [idFeatureField]="idFeatureField"
                    [mapLayers]="mapLayers"
                    [mapSources]="mapSources"
                    [featureToHightLight]="featureToHightLight"
                    [featuresToSelect]="featuresToSelect"
                    [boundsToFit]="boundsToFit"
                    [drawPolygonVerticesLimit]="drawPolygonVerticesLimit"
                    [drawButtonEnabled]="drawButtonEnabled"
                    [mapAttributionPosition]="mapAttributionPosition"
                    [icons]="icons"
                    (visualisations)="changeVisualisationWrapper($event)"
                    (onAoiChanged)="onChangeAoiWrapper($event)"
                    (onAoiEdit)="onAoiEditWrapper($event)"
                    (onMove)="onMoveWrapper($event)"
                    (onBasemapChanged)="onBasemapChangedWrapper()"
                    (onMapLoaded)="onMapLoadedWrapper($event)"
                    (legendVisibiltyStatus)="legendVisibiltyStatusWrapper($event)"
                    (onFeatureOver)="emitFeaturesOnOverWrapper($event)"
                    (onFeatureClic)="emitFeaturesOnClicWrapper($event)"
                    (downloadSourceEmitter)="downloadLayerSourceWrapper($event)">
</arlas-mapgl-mapbox>
